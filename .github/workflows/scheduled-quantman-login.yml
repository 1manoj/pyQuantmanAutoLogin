name: Scheduled Quantman Auto-Login

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

on:
#  schedule:
#    # Runs at 01:30 AM UST on every day-of-week from Monday through Sunday.
#    #   i.e. 07:00 AM IST on every day-of-week from Monday through Sunday.
#    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  quantman-login:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.3'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Configuration File
        env:
          # Use the repository secrets mapped here
          USERNAME: ${{ secrets.FLATTRADE_USERNAME }}
          PASSWORD: ${{ secrets.FLATTRADE_PASSWORD }}
          PIN: ${{ secrets.FLATTRADE_PIN }}
          TOTP_SECRET: ${{ secrets.TOTP_SECRET }}
          GH_TOKEN: ${{ secrets.GH_PAT }} # Your Personal Access Token (PAT)
          GH_REPO: ${{ secrets.GH_REPO}}
          GH_OWNER: ${{ secrets.GH_OWNER}}
          # Alternatively, map other variables if needed
        run: |
          mkdir -p config
          echo '{
            "broker": "Flattrade",
            "username": "'$USERNAME'",
            "password": "'$PASSWORD'",
            "pin": "'$PIN'",
            "totp_secret": "'$TOTP_SECRET'",
            "GITHUB_TOKEN": "'$GH_TOKEN'",
            "GITHUB_REPO": "'$GH_REPO'",
            "GITHUB_OWNER": "'$GH_OWNER'",
            "notification_settings": {
              "whatsapp_enabled": false,
              "sms_enabled": false
            },
            "retry_settings": {
              "attempts": 2,
              "delay_seconds": 30
            },
            "buffer_small_delay_seconds": 3,
            "buffer_medium_delay_seconds": 6,
            "browser_settings": {
              "headless": true,
              "timeout": 20,
              "window_size": [
                1920,
                1080
              ]
            }
          }' > config/config.json

      - name: Run scheduled Quantman Login
        env:
          # Your Secrets are mapped directly here:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          TWILIO_WHATSAPP_NUMBER: ${{ secrets.TWILIO_WHATSAPP_NUMBER }}
          NOTIFICATION_PHONE_NUMBER: ${{ secrets.NOTIFICATION_PHONE_NUMBER }}
          FLATTRADE_API_KEY: ${{ secrets.FLATTRADE_API_KEY }}
          FLATTRADE_API_SECRET: ${{ secrets.FLATTRADE_API_SECRET }}
        run: |
          python src/quantman_auto_login.py
          
      - name: Upload Debug Logs and Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: logs/
